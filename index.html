<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday!</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: 'Arial', sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background: linear-gradient(135deg,#ff6b6b,#ff9ff3,#54a0ff);
    position:relative;
}

/* Main Card */
.card{
    width:90%;
    max-width:500px;
    background:rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    border-radius:25px;
    padding:35px 25px;
    text-align:center;
    color:white;
    box-shadow:0 8px 30px rgba(0,0,0,0.25);
    z-index:2;
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

h1{
    font-size:2.5rem;
    margin-bottom:15px;
    text-shadow:0 0 15px rgba(255,255,255,.7);
}

.cake{
    font-size:80px;
    animation:bounce 1.5s infinite;
}

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-15px);}
}

.message{
    font-size:1.1rem;
    line-height:1.8;
    margin-top:20px;
}

.name{
    color:#ffe66d;
    font-weight:bold;
    font-size:1.4rem;
}

.glow{
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px #fff;
    }
    to{
        text-shadow:0 0 25px #fff,
                     0 0 40px #ffe66d;
    }
}

/* Confetti */
.confetti{
    position:absolute;
    width:12px;
    height:12px;
    top:-20px;
    opacity:0.9;
    animation:fall linear infinite;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}

/* Mobile */
@media(max-width:600px){
    h1{
        font-size:2rem;
    }

    .cake{
        font-size:65px;
    }

    .message{
        font-size:1rem;
    }

    .card{
        padding:25px 18px;
    }
}
</style>
</head>
<body>

<div class="card">
    <div class="cake">🎂</div>

    <h1 class="glow">Happy Birthday!</h1>

    <div class="message">
        Dear <span class="name">Unnu </span>,
        <br><br>
        Wishing you a day filled with happiness,
        laughter, love, and unforgettable moments. 🎉
        <br><br>
        May all your dreams come true and may this year
        bring endless success and joy into your life.
        💖✨
        <br><br>
        Have an amazing birthday! 🎊🎁
    </div>
</div>

<script>
// Confetti Generator
const colors = [
    "#ff6b6b",
    "#feca57",
    "#48dbfb",
    "#1dd1a1",
    "#ff9ff3",
    "#ffffff"
];

function createConfetti() {
    const confetti = document.createElement("div");
    confetti.classList.add("confetti");

    confetti.style.left = Math.random() * 100 + "vw";
    confetti.style.backgroundColor =
        colors[Math.floor(Math.random() * colors.length)];

    confetti.style.width =
        confetti.style.height =
        Math.random() * 10 + 6 + "px";

    confetti.style.animationDuration =
        Math.random() * 3 + 3 + "s";

    document.body.appendChild(confetti);

    setTimeout(() => {
        confetti.remove();
    }, 7000);
}

setInterval(createConfetti, 120);
</script>

</body>
</html>
